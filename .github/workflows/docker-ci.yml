name: Mon Robot Pipeline CI Super Solide

on:
  push:
    branches: [ "main" ]

jobs:
  # JOB 1 : La phase de vérification et de sécurité
  verification:
    runs-on: ubuntu-latest
    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v4

    # BARRIÈRE 1 : On vérifie la propreté du fichier HTML
    - name: Vérifier la syntaxe HTML (Linting)
      uses: htmlhint/action-htmlhint@v2.2.0
      with:
        files: 'index.html'

    # BARRIÈRE 2 : On vérifie la sécurité et l'optimisation du Dockerfile
    - name: Vérifier la sécurité du Dockerfile (Hadolint)
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: 'Dockerfile'

  # JOB 2 : La phase de fabrication (ne se lance QUE si le JOB 1 est un succès)
  build-and-push:
    runs-on: ubuntu-latest
    needs: verification # ⚠️ C'est cette ligne magique qui lie les deux jobs !
    
    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v4

    - name: Se connecter à Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Fabriquer et envoyer l'image Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/mon-site-devops:latest