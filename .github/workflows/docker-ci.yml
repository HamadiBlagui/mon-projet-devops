name: Docker CI (Contrôle Qualité)

# Le script se déclenche à chaque fois que tu fais un "git push" sur la branche main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verification:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub récupère ton code
    - name: Récupération du code
      uses: actions/checkout@v4

    # 2. GitHub vérifie que la recette Dockerfile fonctionne chez lui
    - name: Test de fabrication de l'image Docker
      run: |
        docker build -t mon-site-test:latest .
        echo "✅ L'image Docker s'est construite sans aucune erreur !"